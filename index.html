<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Majo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif
        }

        .garden {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #0a0618 0%, #130c2a 40%, #1c1035 70%, #0e0820 100%)
        }

        /* aurora suave */
        .aurora {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 55%;
            pointer-events: none;
            overflow: hidden
        }

        .aurora::before {
            content: '';
            position: absolute;
            top: -60px;
            left: 10%;
            width: 80%;
            height: 300px;
            background: radial-gradient(ellipse at 50% 50%, rgba(120, 60, 220, .13) 0%, rgba(80, 30, 160, .07) 45%, transparent 70%);
            animation: auroraPulse 8s ease-in-out infinite
        }

        .aurora::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 25%;
            width: 50%;
            height: 200px;
            background: radial-gradient(ellipse at 50% 50%, rgba(180, 100, 255, .09) 0%, transparent 65%);
            animation: auroraPulse 11s ease-in-out infinite reverse
        }

        @keyframes auroraPulse {

            0%,
            100% {
                opacity: .6;
                transform: scaleX(1)
            }

            50% {
                opacity: 1;
                transform: scaleX(1.08)
            }
        }

        /* estrellas */
        .stars {
            position: absolute;
            inset: 0;
            pointer-events: none
        }

        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d, 3s) ease-in-out infinite
        }

        .star.big {
            width: 3px;
            height: 3px;
            box-shadow: 0 0 4px 1px rgba(255, 255, 255, .5)
        }

        .star.sm {
            width: 1.5px;
            height: 1.5px
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .2;
                transform: scale(.8)
            }

            50% {
                opacity: 1;
                transform: scale(1.3)
            }
        }

        /* luna */
        .moon {
            position: absolute;
            top: 60px;
            right: 12%;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 38%, #f8efd4 0%, #e8d5a0 60%, #c8a85a 100%);
            box-shadow: 0 0 20px 6px rgba(248, 239, 212, .18), 0 0 60px 20px rgba(248, 239, 212, .06);
            animation: moonGlow 6s ease-in-out infinite
        }

        @keyframes moonGlow {

            0%,
            100% {
                box-shadow: 0 0 20px 6px rgba(248, 239, 212, .18), 0 0 60px 20px rgba(248, 239, 212, .06)
            }

            50% {
                box-shadow: 0 0 28px 10px rgba(248, 239, 212, .26), 0 0 80px 30px rgba(248, 239, 212, .1)
            }
        }

        .moon-crater {
            position: absolute;
            border-radius: 50%;
            background: rgba(180, 140, 60, .35)
        }

        /* título */
        .title {
            position: absolute;
            top: 72px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 10;
            animation: fadeDown .8s ease-out both
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-18px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .title h1 {
            font-size: clamp(42px, 8vw, 72px);
            font-weight: 300;
            letter-spacing: 12px;
            color: #ffe89e;
            text-shadow: 0 0 40px rgba(255, 200, 80, .3), 0 2px 4px rgba(0, 0, 0, .4)
        }

        .title p {
            margin-top: 10px;
            font-size: clamp(13px, 2.5vw, 17px);
            letter-spacing: 7px;
            color: #ffd276;
            opacity: .85;
            font-style: italic
        }

        /* separador */
        .divider {
            margin: 14px auto 0;
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 210, 100, .5), transparent)
        }

        /* contenedor de la planta */
        .scene {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(760px, 98vw);
            height: min(560px, 55vh);
            z-index: 5
        }

        /* suelo */
        .ground-glow {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: radial-gradient(ellipse at 50% 100%, rgba(180, 130, 50, .15) 0%, transparent 70%);
            pointer-events: none
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-11px)
            }
        }

        @keyframes floatCenter {

            0%,
            100% {
                transform: translateY(0) scale(1.12)
            }

            50% {
                transform: translateY(-13px) scale(1.12)
            }
        }
    </style>
</head>

            { t: 9, l: 45, s: 'sm', d: 2.8 }, { t: 17, l: 55, s: 'big', d: 3.5 }, { t: 7, l: 65, s: 'sm', d: 2 }, { t: 12, l: 73, s: 'big', d: 4.2 },
            { t: 25, l: 80, s: 'sm', d: 1.5 }, { t: 19, l: 88, s: 'big', d: 3 }, { t: 3, l: 92, s: 'sm', d: 2.6 }, { t: 30, l: 5, s: 'sm', d: 3.8 },
            { t: 38, l: 22, s: 'big', d: 2.4 }, { t: 44, l: 42, s: 'sm', d: 4.5 }, { t: 35, l: 60, s: 'sm', d: 1.9 }, { t: 42, l: 78, s: 'big', d: 3.1 },
            { t: 50, l: 90, s: 'sm', d: 2.2 }, { t: 28, l: 50, s: 'big', d: 3.7 }, { t: 10, l: 40, s: 'sm', d: 1.6 }, { t: 16, l: 58, s: 'big', d: 2.9 }
        ];
        starData.forEach(s => {
            const el = document.createElement('span');
            el.className = 'star ' + s.s;
            el.style.cssText = `top:${s.t}%;left:${s.l}%;--d:${s.d}s;animation-delay:${(Math.random() * 3).toFixed(1)}s`;
            starsEl.appendChild(el);
        });

        // Partículas (Cambiadas a un tono dorado/amarillo como polen mágico)
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let W, H, particles = [];
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight }
        resize();
        window.addEventListener('resize', resize);
        for (let i = 0; i < 28; i++) {
            particles.push({
                x: Math.random() * 1, y: .5 + Math.random() * .5, vx: (Math.random() - .5) * .0003, vy: -Math.random() * .0004 - .0001,
                r: Math.random() * 1.8 + .4, a: Math.random() * .6 + .1, hue: Math.random() * 15 + 40 // Tono amarillo/oro
            });
        }
        function animParticles() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.a += .002;
                if (p.y < 0) { p.y = .85 + Math.random() * .15; p.x = .3 + Math.random() * .4 }
                ctx.beginPath();
                ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue},95%,75%,${Math.abs(Math.sin(p.a)) * .6})`;
                ctx.fill();
            });
            requestAnimationFrame(animParticles);
        }
        function animParticles() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.a += .002;
                if (p.y < 0) { p.y = .85 + Math.random() * .15; p.x = .3 + Math.random() * .4 }
                ctx.beginPath();
                ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue},90%,70%,${Math.abs(Math.sin(p.a)) * .5})`;
                ctx.fill();
            });
            requestAnimationFrame(animParticles);
        }
        animParticles();
    </script>
